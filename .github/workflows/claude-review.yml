name: Claude Python Reviewer

# Posts a single, line-anchored review on every PR — overall summary +
# inline comments + verdict — by delegating to the
# `everything-claude-code:python-reviewer` subagent so the in-CI review
# matches what the local `/code-review` flow produces.
#
# Pattern adapted from BemusedVermin/evolution-simulation's Rust reviewer.
# See that repo's `.github/workflows/claude-code-review.yml` for the full
# rationale; the load-bearing trigger and authentication choices are the
# same here, with the rubric retargeted at Python and this project's
# paper-driven invariants (CLAUDE.md, docs/IMPLEMENTATION_PLAN.md).
#
# ## Trigger choice: `pull_request` + explicit `github_token`
#
# Posts as `github-actions[bot]` (not `claude[bot]`) by passing
# `secrets.GITHUB_TOKEN` directly to `anthropics/claude-code-action`,
# bypassing its OIDC → GitHub App installation token exchange. That
# exchange returns 401 "Invalid OIDC token" on this repo
# (anthropics/claude-code-action#1206). Under `pull_request` semantics
# fork PRs receive a read-only `GITHUB_TOKEN` with no access to repo
# secrets, so the workflow is DOA on forks regardless of the same-repo
# guard below — that guard is for efficiency and UX, not security.
#
# We check out the default branch explicitly so review helpers
# (`scripts/post-pr-review.sh`, `scripts/README.md`) come from `master`
# rather than the PR head. The agent reads PR-side content via
# `gh pr diff` / `gh api .../contents?ref=<head_sha>` so untrusted PR
# code is never executed locally.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    # Skip PRs that touch only docs / CI / config — the python-reviewer
    # agent reviews Python source and has no rubric for the rest, so
    # firing on those diffs just spends Anthropic credits on noise.
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'

# Newest push wins; older runs on the same PR are cancelled.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  python-review:
    # Same-repo + non-draft guard. Not a security boundary under
    # `pull_request` (fork PRs already cannot read secrets), but it
    # avoids spinning up a runner for a job that would be DOA on a
    # fork PR and skips the review for drafts.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      # `pull-requests: write` is required so the action can POST the
      # review and inline comments. `id-token` is intentionally NOT
      # requested — the OIDC → GitHub App exchange is exactly what we
      # are sidestepping by passing `secrets.GITHUB_TOKEN` directly.
      contents: read
      pull-requests: write
      issues: read

    steps:
      # Defense-in-depth checkout. PR-side content is fetched via the
      # GitHub API (`gh pr diff`, `gh api .../contents?ref=<head_sha>`)
      # so PR code is never executed locally. Pinning the checkout to
      # the default branch keeps the trust model identical to the
      # `pull_request_target` version this pattern descends from.
      - name: Checkout default branch (trusted)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false

      # Capture the wall-clock time before the reviewer runs. The
      # silent-failure guard below uses this as a lower bound when
      # asking GitHub "did THIS run's reviewer post?" — without it, a
      # review left over from a concurrency-cancelled earlier run on
      # the same head SHA would let a silent-success regression slip.
      - name: Record job start
        id: job-start
        run: |
          set -euo pipefail
          echo "iso=$(date -u --iso-8601=seconds)" >> "$GITHUB_OUTPUT"

      # Compute review round + last-reviewed commit. The reviewer
      # applies a severity ratchet: round 1 blocks on
      # CRITICAL / HIGH / MEDIUM; round 2+ blocks only on
      # CRITICAL / HIGH (MEDIUM/LOW become advisory inline comments
      # under an APPROVE verdict). This stops the bot from looping
      # forever on freshly-discovered nits each push.
      - name: Compute review round
        id: review-round
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          BOT_LOGIN: github-actions[bot]
        run: |
          set -euo pipefail
          reviews_json=$(gh api "repos/${REPO}/pulls/${PR}/reviews" --paginate)

          prior_count=$(jq --arg login "$BOT_LOGIN" \
            '[.[] | select(.user.login == $login)] | length' \
            <<<"$reviews_json")

          if [ "$prior_count" -eq 0 ]; then
            review_round=1
            last_sha=""
          else
            review_round=$((prior_count + 1))
            last_sha=$(jq -r --arg login "$BOT_LOGIN" \
              '[.[] | select(.user.login == $login)] | sort_by(.submitted_at) | last | .commit_id' \
              <<<"$reviews_json")
          fi

          echo "round=${review_round}" >> "$GITHUB_OUTPUT"
          echo "last_sha=${last_sha}" >> "$GITHUB_OUTPUT"
          echo "Review round: ${review_round} (last reviewed SHA: ${last_sha:-none})"

      # Install uv so the orchestrator can run the project's check
      # suite (ruff / pyright / pytest) when it wants to verify a
      # finding before posting it.
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Run Claude python-reviewer
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Pass GITHUB_TOKEN directly so the action skips its
          # OIDC → GitHub App installation token exchange (failing with
          # 401 on this repo, see header comment). Side effect: review
          # posts as `github-actions[bot]` rather than `claude[bot]`.
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # Orchestrator CLI flags. Keeps the orchestrator deliberately
          # small — it gathers PR metadata, delegates the rubric work
          # to the python-reviewer subagent, and posts the result.
          #
          # * `--allowed-tools` — minimum surface for the orchestrator.
          #   Edit and WebFetch are deliberately excluded: the
          #   orchestrator writes the payload once with Write and reads
          #   external content only via gh, never the open web.
          #
          # * `--max-turns 20` — backstop. Normal path is ~7 turns
          #   (gather PR data → read prior comments → spawn subagent →
          #   build payload → post). 20 leaves margin for retries;
          #   beyond that means the prompt is being misinterpreted.
          #
          # No `--model` flag — let the action default. Sonnet 4.6 has
          # been observed to reliably handle the JSON inspection +
          # conditional flow this orchestrator does (see the
          # evolution-simulation reviewer's Haiku regression on
          # PR #234 if curious).
          claude_args: |
            --allowed-tools "Bash,Read,Write,Grep,Glob,Task"
            --max-turns 20

          # Load the everything-claude-code marketplace so the
          # python-reviewer subagent (and its sibling reviewers, used
          # transitively) is available to the orchestrator.
          plugin_marketplaces: |
            https://github.com/affaan-m/everything-claude-code.git
          plugins: |
            everything-claude-code@everything-claude-code

          prompt: |
            You are the orchestrator for a Python pull-request review on the
            `emergent-systems` library — a typed JAX scaffold that implements
            the substrate-agnostic emergent-systems framework defined in
            `docs/emergent_systems.tex`. Pull request:
            #${{ github.event.pull_request.number }} in
            ${{ github.repository }}.

            ## Review round (severity ratchet)

            REVIEW_ROUND=${{ steps.review-round.outputs.round }}
            LAST_REVIEWED_SHA=${{ steps.review-round.outputs.last_sha }}

            * `REVIEW_ROUND == 1` — first time the bot is reviewing this
              PR. Block on CRITICAL / HIGH / MEDIUM. LOW notes are
              advisory.
            * `REVIEW_ROUND >= 2` — a prior bot review already covered
              this PR. Block ONLY on CRITICAL / HIGH. MEDIUM and LOW
              findings on round 2+ are advisory inline comments posted
              under an APPROVE verdict — they do not block the merge.

            The ratchet exists so the bot does not cycle through fresh
            nits on every push. After the first pass we trust the
            author to handle minor concerns as follow-ups; only
            correctness-level findings keep gating.

            ## Your job

            Delegate the actual review to the
            `everything-claude-code:python-reviewer` subagent via the
            Agent / Task tool. The subagent already encodes the rubric
            for PEP 8, Pythonic idioms, type hints, security, and
            performance — do not re-derive it.

            Brief the subagent with the repo-specific invariants below
            so its findings line up with this codebase's contracts.
            Then collect its findings, format them into the review
            payload shape documented in `scripts/README.md`, and POST
            the review with `scripts/post-pr-review.sh`.

            ## Repo-specific invariants — brief the subagent with these

            **The paper is a work in progress.** Re-read
            `docs/emergent_systems.tex` (or the relevant section of it)
            before judging type signatures — the canonical answer
            lives there, not in this prompt.

            Load-bearing decisions are recorded in `CLAUDE.md` and
            `docs/IMPLEMENTATION_PLAN.md`; have the subagent read both
            before reviewing. The non-negotiables for this codebase:

            1. **Type fidelity to the paper.** Slot Protocols
               (`Substrate`, `Variation`, `ViabilityFilter`,
               `InteractionTopology`, `StatefulObserver`) must match
               their paper signatures (paper §3.1, §3.3–§3.5).
               Plain-English identifiers must carry a
               `# paper: <symbol>` sibling comment — this is a hard
               rule the user explicitly asked for. Greek/symbol-only
               identifiers (`phi`, `mu`, `kappa`, etc.) are CRITICAL.

            2. **Hot-path purity.** No `@beartype` or `@jaxtyped`
               decorators on code reachable from `step()` / `run()` /
               `vmap` / `jit`. The source-level guard in
               `tests/test_typing.py` enforces this; flag any new
               wrapper that violates it as CRITICAL.

            3. **`P(X)` vs `M+(X)` separation.** `Distribution[State]`
               (codomain of V) and `Population[State]` (codomain of F)
               are deliberately separate. Paper §3.4's V_T formula
               `Σ_e w_e · V(...)` is a sum of measures, so V cannot be
               a bare sampler. Reject any change that collapses them
               (CRITICAL).

            4. **Conjecture C1.** Do not unify the four viability
               formalisms (`MarkovBlanketViability`,
               `AutopoieticClosureViability`, `RAFSetViability`,
               `MinimalCriterionViability`). Paper §5.1 leaves this
               open. Reject any change that introduces a shared
               `ClosureViability` superclass (CRITICAL).

            5. **Iteration order is data, not behaviour.**
               `System.iteration_order: tuple[SlotName, ...]` — paper
               §4 conformance item 8 requires this. Hard-coding the
               order back into `step()` is HIGH.

            6. **Conformance preservation.** Changes to slot Protocols
               must keep `SystemSpec.from_system` and the 11-item
               checklist (paper §4) introspectable (HIGH).

            7. **Performance bottlenecks.** New hot Python paths
               should carry `# PERF[name]: reason` comments per
               `src/emergent_systems/perf.py`. Don't silently delete
               existing PERF flags (MEDIUM).

            ## Steps

            1. `gh pr view ${{ github.event.pull_request.number }} --json title,body,files`
               for PR metadata and the file list.
            2. **Fetch the diff to review.** Branch on `REVIEW_ROUND`:

               * **Round 1**: full PR diff —
                 `gh pr diff ${{ github.event.pull_request.number }}`.

               * **Round 2+**: incremental diff between the previous
                 reviewed commit and the current head —
                   gh api \
                     -H "Accept: application/vnd.github.v3.diff" \
                     "repos/${{ github.repository }}/compare/${LAST_REVIEWED_SHA}...${{ github.event.pull_request.head.sha }}"
                 The subagent reviews ONLY the bytes that changed
                 since the last review.

               For surrounding context on PR-side files (either round),
               use
                 gh api "repos/${{ github.repository }}/contents/<path>?ref=${{ github.event.pull_request.head.sha }}" \
                   --jq '.content' | base64 -d
               The local checkout is the default branch, not the PR.
               Trusted helpers (`scripts/post-pr-review.sh`,
               `scripts/README.md`) come from disk and are safe to
               run.
            3. **Read prior inline comments** so you do not duplicate
               findings the previous reviewer run already raised at
               the same line:
                  gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments" \
                    --paginate > /tmp/prior_inline_comments.json
            4. If the PR body references an issue (`Closes #N`),
               `gh issue view N` so the subagent can check coverage.
            5. Spawn the `everything-claude-code:python-reviewer`
               subagent via the Agent tool. Pass it: the diff, the
               issue body (if any), the invariant excerpts above, AND
               the contents of `/tmp/prior_inline_comments.json`. Ask
               the subagent to return findings as
               `{path, line, severity, body, suggestion, status}`
               records, where `status` is one of:
                 * `new` — no prior inline comment at `(path, line)`
                   covers the same concern.
                 * `duplicate` — a prior inline comment at the same
                   `(path, line)` already raised the same concern AND
                   is still applicable on the new diff. Drop it; the
                   prior thread already records it.
                 * `obsolete` — a prior inline comment raised a
                   concern that is now resolved on the new diff.
                   Drop it; the prior thread is history but doesn't
                   need reposting.
            6. **Build the review payload** (per `scripts/README.md`)
               from ONLY the `new` findings. Severity-prefix each
               inline comment (`**CRITICAL** —`, `**HIGH** —`,
               `**MEDIUM** —`, `**LOW** —`) and put a severity-count
               summary in the overall body. Open the body with one
               sentence noting the dedup state, e.g.
               "Compared against 4 prior inline comments: 2 still
               apply (not reposted), 1 resolved, 1 unrelated."
            7. **Pick exactly ONE branch and post exactly ONE
               artefact.** Compute `new_findings = count(status ==
               "new")` first, then branch on that count alone:

                 * `new_findings >= 1` →
                   **submit a REVIEW** via
                   `scripts/post-pr-review.sh`. Inline-comment EVERY
                   `new` finding (no top-level summary substitute).
                   The payload's `event` field MUST match the verdict
                   in the next section.

                 * `new_findings == 0` AND
                   `prior_inline_comments.json` has at least one entry
                   (a previous review run left feedback) →
                   **post a top-level ISSUE COMMENT** via
                     gh api -X POST \
                       "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
                       -f body="No new findings on \`<head_sha[:8]>\`. Prior review's <N> finding(s) still apply on this commit."

                 * `new_findings == 0` AND
                   `prior_inline_comments.json` is empty (clean diff,
                   OR every prior finding is `obsolete`) →
                   **submit an APPROVE-event REVIEW** via
                   `scripts/post-pr-review.sh` with empty
                   `comments[]`, `event: "APPROVE"`, and a one-line
                   body.

               These three branches are mutually exclusive and
               exhaustive. **Hard rule on tool choice**: the only way
               to land an authoritative output is
               `scripts/post-pr-review.sh` (for a review) or
               `gh api -X POST .../issues/N/comments` (for the
               no-new-findings comment). Do NOT call the GitHub REST
               reviews API directly, do NOT call the
               `add_comment_to_pending_review` /
               `add_reply_to_pull_request_comment` MCP tools, and do
               NOT invoke `scripts/post-pr-review.sh` more than once.

            ## Verdict rules (severity ratchet)

            * **Round 1** (first review on this PR):
              * `REQUEST_CHANGES` if any new CRITICAL / HIGH / MEDIUM.
              * `APPROVE` if no MEDIUM-or-above (clean, only LOW
                notes, or every finding was duplicate/obsolete).

            * **Round 2+** (prior bot review already covered this PR):
              * `REQUEST_CHANGES` only if any new CRITICAL or HIGH.
              * `APPROVE` if no HIGH-or-above. MEDIUM and LOW findings
                still get posted as advisory inline comments — they do
                not block. The verdict line should make this visible:
                `**APPROVE** — round 2+ advisory: 2 MEDIUM · 1 LOW (non-blocking)`.

            `duplicate` / `obsolete` findings do NOT count toward the
            verdict in either round.

            * **`COMMENT`** is the fallback for cases where you
              genuinely cannot make the call (diff too large, change
              is purely policy/config without a rubric).

            * State the verdict, severity counts, AND the round on
              the first line of the overall body, e.g.
              `**APPROVE** — round 1 — 0 CRITICAL · 0 HIGH · 0 MEDIUM · 2 LOW (new) · 1 prior still applies`.

            ### Verdict ↔ payload `event` mapping

            The verdict you state in the body's first line MUST match
            the `event` field of the JSON payload. The two strings
            drive different things — the body line is human-readable,
            the `event` field is what GitHub's per-reviewer rollup
            looks at — but they MUST agree:

            | Verdict in body line | Required `event` value |
            | -------------------- | ---------------------- |
            | `**APPROVE** — ...` (any round, advisory or not) | `"APPROVE"` |
            | `**REQUEST_CHANGES** — ...` | `"REQUEST_CHANGES"` |
            | `**COMMENT** — ...` (explicit fallback only) | `"COMMENT"` |

            ## Constraints

            * Inline comments must reference a specific line in the
              new file (`side: "RIGHT"`). Don't fall back to a
              top-level comment when a line anchor would work.
            * Be terse and specific — one issue per inline comment
              with a concrete suggestion.
            * Stay grounded in what the diff contains. Do not invent
              issues that aren't in the change.
            * The review you POST is the authoritative output. Do not
              paraphrase it into a separate top-level comment after.
            * Do not stack duplicate findings — drop them via
              `status: "duplicate"` rather than reposting.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # for the full set of action options.

      # Silent-failure guard. Turns three failure modes into hard
      # failures so success-but-empty regressions are loud:
      #   1. Claude reported `is_error: true`.
      #   2. Claude had any permission denials (allowlist too narrow).
      #   3. Claude finished cleanly but neither a review nor a
      #      `github-actions[bot]` issue comment landed for the PR
      #      after this job started.
      #
      # Runs `if: always()` against the action's outcome so it still
      # fires when the action returns success-but-empty. Skipped when
      # the action itself failed hard (already loud on its own).
      - name: Verify reviewer actually posted a review
        if: always() && steps.claude-review.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          JOB_START: ${{ steps.job-start.outputs.iso }}
          OUTPUT_FILE: ${{ runner.temp }}/claude-execution-output.json
          BOT_LOGIN: github-actions[bot]
        run: |
          set -euo pipefail

          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "::error::No claude-execution-output.json at $OUTPUT_FILE — the action did not run Claude."
            exit 1
          fi

          # The action writes the SDK event log as a single JSON
          # array. Filter to the final element with `"type":"result"`,
          # which carries is_error / permission_denials_count.
          result=$(jq '[.[] | select(.type == "result")] | last' "$OUTPUT_FILE")

          if [ -z "$result" ] || [ "$result" = "null" ]; then
            echo "::error::No 'result' event in claude-execution-output.json. Action did not finish cleanly."
            exit 1
          fi

          is_error=$(jq -r '.is_error // false' <<<"$result")
          denials=$(jq -r '.permission_denials_count // 0' <<<"$result")

          if [ "$is_error" = "true" ]; then
            echo "::error::Claude reported is_error=true. Result event: $result"
            exit 1
          fi

          if [ "$denials" != "0" ]; then
            echo "::error::Claude had $denials permission denials — review likely incomplete. Update claude_args --allowed-tools."
            echo "Result event: $result"
            exit 1
          fi

          # Confirm a review or a `github-actions[bot]` comment
          # actually landed AFTER this job started.
          reviews_json=$(gh api "repos/${REPO}/pulls/${PR}/reviews")
          review_count=$(
            jq --arg head_sha "$HEAD_SHA" \
               --arg job_start "$JOB_START" \
               '[.[] | select(.commit_id == $head_sha and .submitted_at > $job_start)] | length' \
               <<<"$reviews_json"
          )

          comments_json=$(gh api "repos/${REPO}/issues/${PR}/comments")
          comment_count=$(
            jq --arg login "$BOT_LOGIN" \
               --arg job_start "$JOB_START" \
               '[.[] | select(.user.login == $login and .created_at > $job_start)] | length' \
               <<<"$comments_json"
          )

          if [ "$review_count" = "0" ] && [ "$comment_count" = "0" ]; then
            echo "::error::Reviewer ran cleanly but neither a review nor a bot comment was posted for ${HEAD_SHA} after ${JOB_START}."
            echo "Result event: $result"
            exit 1
          fi

          # The orchestrator must post exactly one artefact per run.
          # Anything more means stacked review records, which is
          # exactly the noise this workflow was rewritten to avoid.
          total=$(( review_count + comment_count ))
          if [ "$total" -gt 1 ]; then
            echo "::error::Reviewer landed ${total} artefacts (${review_count} review(s) + ${comment_count} comment(s)) for ${HEAD_SHA} since ${JOB_START}; expected exactly one. Inspect the prompt's 'Hard rule on tool choice' constraint."
            exit 1
          fi

          echo "✓ Reviewer landed ${review_count} review(s) and ${comment_count} bot comment(s) for ${HEAD_SHA} since ${JOB_START} (denials=${denials})."
